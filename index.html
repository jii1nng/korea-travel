<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>韩国旅行助手</title>
    <style>
        :root {
            --bg: #fff7fb;
            --panel: #ffffff;
            --accent: #ff4fa3;
            --accent-2: #ff7ab6;
            --accent-3: #7a4dff;
            --text: #4b2b4d;
            --muted: #8f6a8d;
            --border: #ffd8eb;
            --success: #2fbe8b;
            --shadow: 0 16px 40px rgba(255, 79, 163, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #ffe6f2 0%, #fff7fb 45%, #fff 100%);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 20px;
        }

        .hero,
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 28px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hero h1 {
            font-size: 1.9rem;
            margin: 0 0 8px;
            color: #a33f7b;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            max-width: 700px;
        }

        .hero-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pill {
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            color: white;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 600;
            white-space: nowrap;
        }

        .module-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 12px;
            z-index: 20;
            padding: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(255, 79, 163, 0.12);
        }

        .module-nav button {
            border: 1px solid var(--border);
            background: #fff8fc;
            color: var(--text);
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .module-nav button.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border-color: var(--accent);
        }

        .panel {
            padding: 22px;
        }

        .overview-panel {
            display: grid;
            gap: 14px;
        }

        .overview-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .overview-card {
            text-align: left;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px;
            background: linear-gradient(135deg, #fffafc 0%, #fff 100%);
            box-shadow: 0 8px 20px rgba(255, 79, 163, 0.08);
            cursor: pointer;
        }

        .overview-card .label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .overview-card .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .mini-pill {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.78rem;
            background: #fff1f8;
            color: var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: #f5e6ee;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
        }

        .module-search {
            margin-bottom: 12px;
        }

        .module-search input {
            width: 100%;
            padding: 11px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #fffafc;
            color: var(--text);
        }

        .empty-state {
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 16px;
            color: var(--muted);
            text-align: center;
            background: #fffafc;
        }

        .module {
            display: none;
        }

        .module.active {
            display: block;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-title h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .list-card {
            display: grid;
            gap: 12px;
        }

        .item-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            background: #fbfdff;
        }

        .item-card h3 {
            margin: 0 0 4px;
            font-size: 1rem;
        }

        .item-card p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .item-card img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .actions,
        .inline-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button,
        .link-btn {
            border: none;
            border-radius: 10px;
            padding: 9px 12px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.12s ease, opacity 0.12s ease;
        }

        button:hover,
        .link-btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #baa6ab, #f07c9b);
            color: white;
        }

        .btn-light {
            background: #fff1f8;
            color: var(--accent);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #41c59d);
            color: white;
        }

        .export-btn {
            background: linear-gradient(135deg, #d94a8f, #c8b6ff);
            color: white;
        }

        .exchange-grid,
        .wallet-summary {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .stat-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #d2e1f1 0%, #eef7ff 100%);
        }

        .stat-card .label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 1.35rem;
            font-weight: 700;
        }

        .balance-edit {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .editor-panel,
        .wallet-form,
        .add-form {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .row {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .row-2 {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr 1fr;
        }

        .field,
        input[type="number"],
        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 0.95rem;
            background: white;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .preview-image {
            max-width: 100%;
            max-height: 180px;
            border-radius: 12px;
            border: 1px dashed var(--border);
            display: none;
            object-fit: cover;
            margin-top: 6px;
        }

        .payment-toggle {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .payment-toggle label {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            background: #f9fbff;
            color: var(--muted);
        }

        .payment-toggle input {
            display: none;
        }

        .payment-toggle input:checked+span {
            color: var(--accent);
            font-weight: 700;
        }

        .transaction-list {
            list-style: none;
            padding: 0;
            margin: 16px 0 0;
            display: grid;
            gap: 10px;
        }

        .transaction-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            background: #fcfeff;
            gap: 10px;
            flex-wrap: wrap;
        }

        .small {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef4ff;
            color: var(--accent);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .must-go {
            background: #fff4d6;
            color: #9a5b00;
        }

        .inline-check {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
        }

        .share-modal {
            position: fixed;
            inset: 0;
            background: rgba(29, 20, 34, 0.62);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 100;
        }

        .share-panel {
            width: min(460px, 100%);
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.22);
            display: grid;
            gap: 12px;
        }

        .share-panel h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .share-panel .small {
            margin: 0;
        }

        .share-qr {
            width: 220px;
            height: 220px;
            object-fit: contain;
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px;
            background: #fff;
        }

        .share-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        @media (max-width: 700px) {
            .app {
                padding: 14px;
            }

            .hero,
            .panel {
                padding: 16px;
            }

            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div id="shareModal" class="share-modal" style="display:none;">
            <div class="share-panel">
                <h3>分享给朋友</h3>
                <p class="small">扫码直接打开，或者复制短链接</p>
                <img id="shareQrImage" class="share-qr" alt="分享二维码" />
                <input id="shareLinkInput" class="field" readonly />
                <input id="shareShortLinkInput" class="field" readonly placeholder="正在生成短链接..." />
                <div class="share-actions">
                    <button id="whatsappShareBtn" class="btn-primary" type="button">WhatsApp</button>
                    <button id="nativeShareBtn" class="btn-primary" type="button">系统分享</button>
                    <button id="copyShortLinkBtn" class="btn-light" type="button">复制短链接</button>
                    <button id="copyOriginalLinkBtn" class="btn-light" type="button">复制原链接</button>
                    <button id="closeShareModalBtn" class="btn-light" type="button">关闭</button>
                </div>
            </div>
        </div>
        <section class="hero">
            <div>
                <h1>韩国旅行助手</h1>
                <p>把行程、美食、必带和必买拆成独立模块，支持上传照片、添加内容和随时修改。</p>
            </div>
            <div class="hero-actions">
                <button id="exportPlanBtn" class="btn-primary export-btn" type="button">导出清单</button>
                <button id="sharePlanBtn" class="btn-primary" type="button"
                    style="background:linear-gradient(135deg, #25D366, #128C7E); border-color:#25D366;">分享给朋友</button>
                <div class="pill"> 快乐旅行</div>
            </div>
        </section>

        <div class="module-nav" id="moduleNav"></div>

        <section class="panel overview-panel">
            <div class="section-title">
                <h2>旅行概览</h2>
                <span class="small">一眼看懂行程必买和打卡进度</span>
            </div>
            <div class="overview-grid">
                <button class="overview-card" data-module="itinerary" type="button">
                    <div class="label">行程进度</div>
                    <div class="value" id="overviewItinerary">0 / 0</div>
                    <div class="mini-pill" id="overviewItineraryBadge">0 个必去</div>
                    <div class="progress-bar"><span id="overviewItineraryBar"></span></div>
                </button>
                <button class="overview-card" data-module="food" type="button">
                    <div class="label">美食想吃</div>
                    <div class="value" id="overviewFood">0 / 0</div>
                    <div class="mini-pill" id="overviewFoodBadge">0 个想吃</div>
                    <div class="progress-bar"><span id="overviewFoodBar"></span></div>
                </button>
                <button class="overview-card" data-module="essentials" type="button">
                    <div class="label">必带准备</div>
                    <div class="value" id="overviewEssentials">0 / 0</div>
                    <div class="mini-pill" id="overviewEssentialsBadge">0 个已准备</div>
                    <div class="progress-bar"><span id="overviewEssentialsBar"></span></div>
                </button>
                <button class="overview-card" data-module="shopping" type="button">
                    <div class="label">必买完成</div>
                    <div class="value" id="overviewShopping">0 / 0</div>
                    <div class="mini-pill" id="overviewShoppingBadge">0 个已买好</div>
                    <div class="progress-bar"><span id="overviewShoppingBar"></span></div>
                </button>
            </div>
        </section>

        <section class="panel module active" data-module="itinerary">
            <div class="section-title">
                <h2>必去</h2>
                <span class="small">支持上传照片、新增和修改行程</span>
                <button id="itineraryToggleBtn" class="btn-light" type="button">新增</button>
            </div>
            <div class="module-search">
                <input id="itinerarySearch" type="text" placeholder="搜索行程、地点、备注" />
            </div>
            <form id="itineraryForm" class="add-form" style="display:none;">
                <div class="row">
                    <input id="itineraryDay" class="field" type="text" placeholder="日期 / Day" required />
                    <input id="itineraryPlace" class="field" type="text" placeholder="地点" required />
                </div>
                <div class="row">
                    <input id="itineraryUrl" class="field" type="text" placeholder="导航链接（可选）" />
                    <input id="itineraryPhotoInput" type="file" accept="image/*" multiple />
                </div>
                <textarea id="itineraryNote" placeholder="行程说明"></textarea>
                <div class="inline-check">
                    <input id="itineraryMustGo" type="checkbox" />
                    <label for="itineraryMustGo">标记为必去</label>
                </div>
                <div id="itineraryPhotoPreview" class="preview-gallery"></div>
                <div class="actions">
                    <button id="itinerarySubmitBtn" class="btn-primary" type="submit">新增 / 保存</button>
                    <button id="itineraryCancelBtn" class="btn-light" type="button">取消编辑</button>
                </div>
            </form>
            <div id="itineraryList" class="list-card"></div>
        </section>

        <section class="panel module" data-module="food">
            <div class="section-title">
                <h2>美食推荐</h2>
                <span class="small">支持上传照片、新增和修改</span>
                <button id="foodToggleBtn" class="btn-light" type="button">新增</button>
            </div>
            <div class="module-search">
                <input id="foodSearch" type="text" placeholder="搜索美食、备注" />
            </div>
            <form id="foodForm" class="add-form" style="display:none;">
                <div class="row">
                    <input id="foodTitle" class="field" type="text" placeholder="美食名称" required />
                    <input id="foodPhotoInput" type="file" accept="image/*" multiple />
                </div>
                <div class="row">
                    <input id="foodUrl" class="field" type="text" placeholder="店铺 / 链接（可选）" />
                    <div class="inline-check">
                        <input id="foodFavorite" type="checkbox" />
                        <label for="foodFavorite">标记为想吃</label>
                    </div>
                </div>
                <textarea id="foodNote" placeholder="美食说明"></textarea>
                <div id="foodPhotoPreview" class="preview-gallery"></div>
                <div class="actions">
                    <button id="foodSubmitBtn" class="btn-primary" type="submit">新增 / 保存</button>
                    <button id="foodCancelBtn" class="btn-light" type="button">取消编辑</button>
                </div>
            </form>
            <div id="foodList" class="list-card"></div>
        </section>

        <section class="panel module" data-module="essentials">
            <div class="section-title">
                <h2>必带物品</h2>
                <span class="small">可新增和标记是否准备好</span>
            </div>
            <div class="module-search">
                <input id="essentialsSearch" type="text" placeholder="搜索必带物品" />
            </div>
            <form id="essentialForm" class="add-form">
                <div class="row">
                    <input id="essentialTitle" class="field" type="text" placeholder="物品名称" required />
                    <textarea id="essentialNote" placeholder="备注"></textarea>
                </div>
                <div class="inline-check">
                    <input id="essentialDone" type="checkbox" />
                    <label for="essentialDone">已经准备好</label>
                </div>
                <div class="actions">
                    <button id="essentialSubmitBtn" class="btn-primary" type="submit">新增 / 保存</button>
                    <button id="essentialCancelBtn" class="btn-light" type="button">取消编辑</button>
                </div>
            </form>
            <div id="essentialsList" class="list-card"></div>
        </section>

        <section class="panel module" data-module="shopping">
            <div class="section-title">
                <h2>必买清单</h2>
                <span class="small">先建立店铺，再把想买的东西加进店铺里</span>
            </div>
            <div class="module-search">
                <input id="shoppingSearch" type="text" placeholder="搜索店铺 / 物品" />
            </div>
            <div class="actions">
                <button id="shoppingStoreToggleBtn" class="btn-light" type="button">新增店铺</button>
            </div>
            <form id="shoppingStoreForm" class="add-form" style="display:none;">
                <div class="row">
                    <input id="shoppingStoreName" class="field" type="text" placeholder="店铺名称" required />
                    <input id="shoppingStorePhotoInput" type="file" accept="image/*" multiple />
                </div>
                <textarea id="shoppingStoreNote" placeholder="店铺说明 / 地址"></textarea>
                <div id="shoppingStorePhotoPreview" class="preview-gallery"></div>
                <div class="actions">
                    <button id="shoppingStoreSubmitBtn" class="btn-primary" type="submit">新增 / 保存</button>
                    <button id="shoppingStoreCancelBtn" class="btn-light" type="button">取消</button>
                </div>
            </form>
            <div id="shoppingStoreList" class="list-card"></div>
            <div id="shoppingDetailPanel" class="editor-panel" style="display:none;">
                <div class="section-title">
                    <h3 id="shoppingDetailTitle">店铺详情</h3>
                </div>
                <form id="shoppingItemForm" class="add-form">
                    <div class="row">
                        <input id="shoppingItemTitle" class="field" type="text" placeholder="想买的东西" required />
                        <input id="shoppingItemPrice" class="field" type="number" min="0" step="1"
                            placeholder="价格（韩元）" />
                    </div>
                    <div class="row">
                        <input id="shoppingItemPhotoInput" type="file" accept="image/*" multiple />
                    </div>
                    <textarea id="shoppingItemNote" placeholder="说明 / 颜色 / 规格"></textarea>
                    <div id="shoppingItemPhotoPreview" class="preview-gallery"></div>
                    <div class="inline-check">
                        <input id="shoppingItemDone" type="checkbox" />
                        <label for="shoppingItemDone">已经买好</label>
                    </div>
                    <div class="actions">
                        <button id="shoppingItemSubmitBtn" class="btn-primary" type="submit">新增 / 保存</button>
                        <button id="shoppingItemCancelBtn" class="btn-light" type="button">取消</button>
                    </div>
                </form>
                <div id="shoppingItemList" class="list-card"></div>
            </div>
        </section>
    </div>

    <script>
        const storageKey = 'korea-trip-helper-v3';
        const shareStateParam = 'state';
        const defaultState = {
            activeModule: 'itinerary',
            itinerary: [
                { id: 1, day: 'Day 1', place: '必去 · 首尔 · 明洞', note: '逛街、韩餐、夜景', url: 'https://map.naver.com/p/search/%EC%84%9C%EC%9A%B8%20%EB%AA%85%EB%8F%99', photos: [], mustGo: true, done: false },
                { id: 2, day: 'Day 2', place: '首尔 · 景福宫', note: '文化景点与拍照打卡', url: 'https://map.naver.com/p/search/%EA%B2%BD%ED%8F%AC%EA%B6%81', photos: [], mustGo: false, done: false },
                { id: 3, day: 'Day 3', place: '釜山 · 海云台', note: '海边散步与海鲜餐厅', url: 'https://map.naver.com/p/search/%ED%95%B4%EC%9A%B4%EB%8C%80', photos: [], mustGo: false, done: false },
                { id: 4, day: 'Day 4', place: '首尔 · 东大门', note: '买衣服与小吃', url: 'https://map.naver.com/p/search/%EB%8F%99%EB%8C%80%EB%AC%B8', photos: [], mustGo: false, done: false }
            ],
            foodItems: [
                { id: 1, title: '韩式烤肉', note: '韩国人气餐厅，适合和朋友一起吃。', photos: [], url: '', favorite: true },
                { id: 2, title: '海鲜炒年糕', note: '釜山海边很适合尝试。', photos: [], url: '', favorite: false },
                { id: 3, title: '冷面', note: '天气热时很清爽。', photos: [], url: '', favorite: false },
                { id: 4, title: '炸鸡', note: '深夜补充能量的好选择。', photos: [], url: '', favorite: false }
            ],

        function normalizeState(input) {
            const parsed = input && typeof input === 'object' ? input : {};
            return {
                ...defaultState,
                ...parsed,
                activeModule: parsed.activeModule || defaultState.activeModule,
                itinerary: Array.isArray(parsed.itinerary) ? parsed.itinerary : defaultState.itinerary,
                foodItems: Array.isArray(parsed.foodItems) ? parsed.foodItems : defaultState.foodItems,
                essentials: Array.isArray(parsed.essentials) ? parsed.essentials : defaultState.essentials,
                shoppingStores: Array.isArray(parsed.shoppingStores) ? parsed.shoppingStores : (Array.isArray(parsed.shopping) ? parsed.shopping.map(item => ({ id: item.id || Date.now() + Math.random(), name: item.title || '店铺', note: item.note || '', photos: item.photo ? [item.photo] : [], items: [] })) : defaultState.shoppingStores)
            };
        }

        function sanitizeStateForSharing(value) {
            if (Array.isArray(value)) {
                return value.map(item => sanitizeStateForSharing(item));
            }
            if (value && typeof value === 'object') {
                const result = {};
                Object.entries(value).forEach(([key, itemValue]) => {
                    if (key === 'photos') return;
                    result[key] = sanitizeStateForSharing(itemValue);
                });
                return result;
            }
            return value;
        }

        function encodeStateForUrl(value) {
            return encodeURIComponent(JSON.stringify(sanitizeStateForSharing(value)));
        }

        function decodeStateFromUrl(value) {
            if (!value) return null;
            try {
                return JSON.parse(decodeURIComponent(value));
            } catch (error) {
                return null;
            }
        }

        function buildShareUrl() {
            const url = new URL(window.location.href);
            url.searchParams.set(shareStateParam, encodeStateForUrl(state));

        function updateShareUrl() {
            const url = new URL(window.location.href);
            url.searchParams.set(shareStateParam, encodeStateForUrl(state));
            history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
        }

        async function getShortShareUrl(url) {
            try {
                const response = await fetch(`https://api.shrtco.de/v2/shorten?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (data && data.ok && data.result) {
                    return data.result.full_short_link || data.result.short_link || url;
                }
            } catch (error) {
                // fallback to original URL
            }
            return url;
        }

        async function copyShareText(text) {
            try {

            } catch (error) {

        function readFileAsDataUrl(file, callback) {

          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.note || '暂无说明')}</p>
          <div class="small" style="margin-top:6px;">价格：${item.price ? `₩${Number(item.price).toLocaleString('en-US')}` : '未填写'}</div>
          ${item.photos && item.photos.length ? `<div class="preview-gallery">${item.photos.map(photo => `<img src="${photo}" alt="${escapeHtml(item.title)}" />`).join('')}</div>` : ''}
          <div class="inline-check" style="margin-top:8px;">
            <input type="checkbox" ${item.done ? 'checked' : ''} data-action="toggle-item" data-store-id="${selectedStore.id}" data-id="${item.id}" />
            <label>${item.done ? '已买好' : '待购买'}</label>
          </div>
          <div class="actions" style="margin-top:10px;">
            <button class="btn-light" data-action="edit-item" data-store-id="${selectedStore.id}" data-id="${item.id}">编辑</button>
            <button class="btn-danger" data-action="delete-item" data-store-id="${selectedStore.id}" data-id="${item.id}">删除</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state">这个店铺还没有想买的物品</div>';
            itemList.querySelectorAll('[data-action="toggle-item"]').forEach(checkbox => checkbox.addEventListener('change', () => toggleShoppingItem(Number(checkbox.getAttribute('data-store-id')), Number(checkbox.getAttribute('data-id')), checkbox.checked)));
            itemList.querySelectorAll('[data-action="edit-item"]').forEach(btn => btn.addEventListener('click', () => openShoppingItemEditor(Number(btn.getAttribute('data-store-id')), Number(btn.getAttribute('data-id')))));
            itemList.querySelectorAll('[data-action="delete-item"]').forEach(btn => btn.addEventListener('click', () => deleteShoppingItem(Number(btn.getAttribute('data-store-id')), Number(btn.getAttribute('data-id')))));
            renderOverview();
            saveState();
        }

        function selectShoppingStore(id) {
            state.activeShoppingStoreId = id;
            renderShopping();
        }

        function openShoppingStoreEditor(id) {
            const store = state.shoppingStores.find(entry => entry.id === id);
            if (!store) return;
            editingShoppingStoreId = id;
            document.getElementById('shoppingStoreName').value = store.name || '';
            document.getElementById('shoppingStoreNote').value = store.note || '';
            shoppingStoreDraftPhotos = store.photos || [];
            renderPhotoGallery(document.getElementById('shoppingStorePhotoPreview'), shoppingStoreDraftPhotos);
            document.getElementById('shoppingStoreSubmitBtn').textContent = '保存修改';
            document.getElementById('shoppingStoreForm').style.display = 'grid';
            showModule('shopping');
        }

        function resetShoppingStoreForm() {
            document.getElementById('shoppingStoreForm').reset();
            renderPhotoGallery(document.getElementById('shoppingStorePhotoPreview'), []);
            shoppingStoreDraftPhotos = [];
            editingShoppingStoreId = null;
            document.getElementById('shoppingStoreSubmitBtn').textContent = '新增 / 保存';
            document.getElementById('shoppingStoreForm').style.display = 'none';
        }

        function saveShoppingStore(payload) {
            if (editingShoppingStoreId) {
                state.shoppingStores = state.shoppingStores.map(store => store.id === editingShoppingStoreId ? { ...store, ...payload } : store);
            } else {
                state.shoppingStores.push({ id: Date.now(), items: [], ...payload });
            }
            state.activeShoppingStoreId = editingShoppingStoreId || state.shoppingStores[state.shoppingStores.length - 1].id;
            renderShopping();
            resetShoppingStoreForm();
            saveState();
        }

        function deleteShoppingStore(id) {
            state.shoppingStores = state.shoppingStores.filter(store => store.id !== id);
            if (!state.shoppingStores.length) {
                state.activeShoppingStoreId = null;
            } else if (state.activeShoppingStoreId === id) {
                state.activeShoppingStoreId = state.shoppingStores[0].id;
            }
            renderShopping();
            saveState();
        }

        function openShoppingItemEditor(storeId, id) {
            const store = state.shoppingStores.find(entry => entry.id === storeId);
            if (!store) return;
            const item = store.items.find(entry => entry.id === id);
            if (!item) return;
            state.activeShoppingStoreId = storeId;
            editingShoppingItemId = id;
            document.getElementById('shoppingItemTitle').value = item.title || '';
            document.getElementById('shoppingItemPrice').value = item.price || '';
            document.getElementById('shoppingItemNote').value = item.note || '';
            document.getElementById('shoppingItemDone').checked = !!item.done;
            shoppingItemDraftPhotos = item.photos || [];
            renderPhotoGallery(document.getElementById('shoppingItemPhotoPreview'), shoppingItemDraftPhotos);
            document.getElementById('shoppingItemSubmitBtn').textContent = '保存修改';
            showModule('shopping');
        }

        function resetShoppingItemForm() {
            document.getElementById('shoppingItemForm').reset();
            renderPhotoGallery(document.getElementById('shoppingItemPhotoPreview'), []);
            shoppingItemDraftPhotos = [];
            editingShoppingItemId = null;
            document.getElementById('shoppingItemSubmitBtn').textContent = '新增 / 保存';
        }

        function saveShoppingItem(payload) {
            const store = state.shoppingStores.find(entry => entry.id === state.activeShoppingStoreId);
            if (!store) {
                alert('请先选择一个店铺');
                return;
            }
            if (editingShoppingItemId) {
                store.items = store.items.map(item => item.id === editingShoppingItemId ? { ...item, ...payload } : item);
            } else {
                store.items.push({ id: Date.now(), done: false, ...payload });
            }
            renderShopping();
            resetShoppingItemForm();
            saveState();
        }

        function deleteShoppingItem(storeId, id) {
            const store = state.shoppingStores.find(entry => entry.id === storeId);
            if (!store) return;
            store.items = store.items.filter(item => item.id !== id);
            renderShopping();
            saveState();
        }

        function toggleShoppingItem(storeId, id, done) {
            const store = state.shoppingStores.find(entry => entry.id === storeId);
            if (!store) return;
            store.items = store.items.map(item => item.id === id ? { ...item, done } : item);
            renderShopping();
            saveState();
        }

        function renderOverview() {
            const itineraryDone = state.itinerary.filter(item => item.done).length;
            const itineraryTotal = state.itinerary.length;
            const mustGoCount = state.itinerary.filter(item => item.mustGo).length;
            const foodFavoriteCount = state.foodItems.filter(item => item.favorite).length;
            const essentialsDone = state.essentials.filter(item => item.done).length;
            const essentialsTotal = state.essentials.length;
            const shoppingStores = state.shoppingStores || [];
            const shoppingDone = shoppingStores.reduce((sum, store) => sum + store.items.filter(item => item.done).length, 0);
            const shoppingTotal = shoppingStores.reduce((sum, store) => sum + store.items.length, 0);

            document.getElementById('overviewItinerary').textContent = `${itineraryDone} / ${itineraryTotal}`;
            document.getElementById('overviewItineraryBadge').textContent = `${mustGoCount} 个必去`;
            document.getElementById('overviewItineraryBar').style.width = `${itineraryTotal ? Math.round((itineraryDone / itineraryTotal) * 100) : 0}%`;
            document.getElementById('overviewFood').textContent = `${foodFavoriteCount} / ${state.foodItems.length}`;
            document.getElementById('overviewFoodBadge').textContent = `${foodFavoriteCount} 个想吃`;
            document.getElementById('overviewFoodBar').style.width = `${state.foodItems.length ? Math.round((foodFavoriteCount / state.foodItems.length) * 100) : 0}%`;
            document.getElementById('overviewEssentials').textContent = `${essentialsDone} / ${essentialsTotal}`;
            document.getElementById('overviewEssentialsBadge').textContent = `${essentialsDone} 个已准备`;
            document.getElementById('overviewEssentialsBar').style.width = `${essentialsTotal ? Math.round((essentialsDone / essentialsTotal) * 100) : 0}%`;
            document.getElementById('overviewShopping').textContent = `${shoppingDone} / ${shoppingTotal}`;
            document.getElementById('overviewShoppingBadge').textContent = `${shoppingDone} 个已买好`;
            document.getElementById('overviewShoppingBar').style.width = `${shoppingTotal ? Math.round((shoppingDone / shoppingTotal) * 100) : 0}%`;

            document.querySelectorAll('.overview-card').forEach(card => {
                card.addEventListener('click', () => showModule(card.getAttribute('data-module')));
            });
        }

        function exportTripPlan() {
            const content = [
                '韩国旅行助手清单',
                `生成时间：${new Date().toLocaleString('zh-CN')}`,
                '',
                '必去：',
                ...state.itinerary.map(item => `- ${item.day} · ${item.place}${item.mustGo ? '（必去）' : ''}：${item.note || '暂无说明'}`),
                '',
                '美食：',
                ...state.foodItems.map(item => `- ${item.title}：${item.note || '暂无说明'}`),
                '',
                '必买：',
                ...state.shoppingStores.flatMap(store => [
                    `- 店铺：${store.name}`,
                    ...store.items.map(item => `  • ${item.title}${item.done ? '（已买好）' : ''}${item.price ? `｜价格：₩${Number(item.price).toLocaleString('en-US')}` : ''}`)
                ])
            ].join('\n');

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'korea-trip-plan.txt';
            link.click();
            URL.revokeObjectURL(link.href);
        }

        document.getElementById('itineraryForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const payload = {
                day: document.getElementById('itineraryDay').value.trim(),
                place: document.getElementById('itineraryPlace').value.trim(),
                note: document.getElementById('itineraryNote').value.trim(),
                url: document.getElementById('itineraryUrl').value.trim(),
                photos: itineraryDraftPhotos,
                mustGo: document.getElementById('itineraryMustGo').checked
            };
            if (!payload.day || !payload.place) { alert('请至少填入日期和地点'); return; }
            saveItineraryItem(payload);
        });
        document.getElementById('itineraryToggleBtn').addEventListener('click', () => toggleModuleForm('itinerary'));
        document.getElementById('itineraryCancelBtn').addEventListener('click', resetItineraryForm);
        document.getElementById('itineraryPhotoInput').addEventListener('change', async (event) => {
            itineraryDraftPhotos = await readFilesAsDataUrls(event.target.files);
            renderPhotoGallery(document.getElementById('itineraryPhotoPreview'), itineraryDraftPhotos);
        });

        document.getElementById('exportPlanBtn').addEventListener('click', exportTripPlan);
        document.getElementById('sharePlanBtn').addEventListener('click', async () => {
            const shareUrl = buildShareUrl();
            await openShareModal();
            const shareLink = document.getElementById('shareLinkInput').value || shareUrl;
            shareWithWhatsApp(shareLink);
        });
        document.getElementById('whatsappShareBtn').addEventListener('click', () => {
            const url = document.getElementById('shareLinkInput').value || buildShareUrl();
            shareWithWhatsApp(url);
        });
        document.getElementById('nativeShareBtn').addEventListener('click', async () => {
            const url = document.getElementById('shareLinkInput').value || buildShareUrl();
            await shareWithNativeSystem(url);
        });
        document.getElementById('copyShortLinkBtn').addEventListener('click', async () => {
            const value = document.getElementById('shareShortLinkInput').value;
            if (value) await copyShareText(value);
        });
        document.getElementById('copyOriginalLinkBtn').addEventListener('click', async () => {
            const value = document.getElementById('shareLinkInput').value;
            if (value) await copyShareText(value);
        });
        document.getElementById('closeShareModalBtn').addEventListener('click', () => {
            document.getElementById('shareModal').style.display = 'none';
        });

        ['itinerary', 'food', 'essentials', 'shopping'].forEach(moduleKey => {
            const input = document.getElementById(`${moduleKey}Search`);
            if (!input) return;
            input.addEventListener('input', () => {
                if (moduleKey === 'itinerary') renderItinerary();
                if (moduleKey === 'food') renderFood();
                if (moduleKey === 'essentials') renderEssentials();
                if (moduleKey === 'shopping') renderShopping();
            });
        });

        document.getElementById('foodToggleBtn').addEventListener('click', () => toggleModuleForm('food'));
        document.getElementById('foodCancelBtn').addEventListener('click', resetFoodForm);
        document.getElementById('foodForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const payload = {
                title: document.getElementById('foodTitle').value.trim(),
                note: document.getElementById('foodNote').value.trim(),
                url: document.getElementById('foodUrl').value.trim(),
                favorite: document.getElementById('foodFavorite').checked,
                photos: foodDraftPhotos
            };
            if (!payload.title) { alert('请填写美食名称'); return; }
            saveFoodItem(payload);
        });
        document.getElementById('foodPhotoInput').addEventListener('change', async (event) => {
            foodDraftPhotos = await readFilesAsDataUrls(event.target.files);
            renderPhotoGallery(document.getElementById('foodPhotoPreview'), foodDraftPhotos);
        });

        document.getElementById('essentialForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const payload = {
                title: document.getElementById('essentialTitle').value.trim(),
                note: document.getElementById('essentialNote').value.trim(),
                done: document.getElementById('essentialDone').checked
            };
            if (!payload.title) { alert('请填写物品名称'); return; }
            saveEssentialItem(payload);
        });
        document.getElementById('essentialCancelBtn').addEventListener('click', resetEssentialForm);

        document.getElementById('shoppingStoreToggleBtn').addEventListener('click', () => {
            const form = document.getElementById('shoppingStoreForm');
            form.style.display = form.style.display === 'grid' ? 'none' : 'grid';
        });
        document.getElementById('shoppingStoreCancelBtn').addEventListener('click', resetShoppingStoreForm);
        document.getElementById('shoppingStoreForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const payload = {
                name: document.getElementById('shoppingStoreName').value.trim(),
                note: document.getElementById('shoppingStoreNote').value.trim(),
                photos: shoppingStoreDraftPhotos
            };
            if (!payload.name) { alert('请填写店铺名称'); return; }
            saveShoppingStore(payload);
        });
        document.getElementById('shoppingStorePhotoInput').addEventListener('change', async (event) => {
            shoppingStoreDraftPhotos = await readFilesAsDataUrls(event.target.files);
            renderPhotoGallery(document.getElementById('shoppingStorePhotoPreview'), shoppingStoreDraftPhotos);
        });
        document.getElementById('shoppingItemForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const payload = {
                title: document.getElementById('shoppingItemTitle').value.trim(),
                price: document.getElementById('shoppingItemPrice').value ? Number(document.getElementById('shoppingItemPrice').value) : '',
                note: document.getElementById('shoppingItemNote').value.trim(),
                photos: shoppingItemDraftPhotos,
                done: document.getElementById('shoppingItemDone').checked
            };
            if (!payload.title) { alert('请填写想买的物品名称'); return; }
            saveShoppingItem(payload);
        });
        document.getElementById('shoppingItemCancelBtn').addEventListener('click', resetShoppingItemForm);
        document.getElementById('shoppingItemPhotoInput').addEventListener('change', async (event) => {
            shoppingItemDraftPhotos = await readFilesAsDataUrls(event.target.files);
            renderPhotoGallery(document.getElementById('shoppingItemPhotoPreview'), shoppingItemDraftPhotos);
        });

        if (!new URLSearchParams(window.location.search).get(shareStateParam)) {
            updateShareUrl();
        }

        renderModuleNav();
        renderItinerary();
        renderFood();
        renderEssentials();
        renderShopping();
        renderOverview();
        showModule(state.activeModule);
    </script>
</body>

</html>
